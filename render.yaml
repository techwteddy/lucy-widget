services:
  - type: web
    name: chatbot-widget-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-widget-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatbot-widget-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: true
      - key: ENVIRONMENT
        value: production

  - type: redis
    name: chatbot-widget-redis
    plan: starter
    ipAllowList: []

databases:
  - name: chatbot-widget-db
    plan: starter
    postgresMajorVersion: 16
