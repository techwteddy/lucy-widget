name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio pytest-cov
      - name: Lint
        run: ruff check api/ tests/ --ignore E501
      - name: Type check
        run: pip install mypy types-redis && mypy api/ --ignore-missing-imports
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_JWT_SECRET: test-secret-at-least-32-chars-long-here
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          SECRET_KEY: test-secret-key-for-jwt-signing-here
        run: pytest tests/ -q --tb=short --cov=api --cov-report=term-missing --cov-fail-under=80
      - name: Security scan
        run: |
          pip install bandit pip-audit
          bandit -r api/ -q -ll
          pip-audit --strict --desc
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Test dashboard
        run: |
          cd dashboard
          npm ci
          npm test
